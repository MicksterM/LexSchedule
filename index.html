<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LexSchedule | Professional Legal Scheduling</title>
  <meta name="description" content="LexSchedule — professional legal scheduling platform streamlining depositions, mediations, client meetings, and more." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400;1,500&family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
  <!-- Email link redirect: convert ?respond= / ?cal= to hash routes before Firebase loads.
       This runs synchronously so email clients never hit a timing-dependent blank page. -->
  <script>
    (function () {
      var p = new URLSearchParams(window.location.search);
      var r = p.get('respond');
      var c = p.get('cal');
      if (r) { window.location.replace(window.location.pathname + '#/respond/' + r); }
      else if (c) { window.location.replace(window.location.pathname + '#/cal/' + c); }
    })();
  </script>
  <style>
    /* Supplement / overrides that blend both stylesheet versions */
    body { background: var(--cream, #F6F1E9); }
    #view { min-height: 100vh; }
    .spinner {
      display: inline-block; width: 18px; height: 18px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff; border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-screen {
      min-height: 100vh; display: flex; align-items: center;
      justify-content: center; background: var(--navy, #0B1F3A);
      flex-direction: column; gap: 20px;
    }
    .loading-text {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.2rem; color: rgba(255,255,255,0.7);
      letter-spacing: 0.08em;
    }
    /* Availability grid responsive */
    .avail-table-wrap { overflow-x: auto; border-radius: 10px; }
    .avail-table { border-collapse: collapse; min-width: 100%; }
    .avail-table th, .avail-table td { border: 1px solid #E5E7EB; }
    .avail-head-name { min-width: 180px; background: #0B1F3A; color: #fff; padding: 12px 16px; text-align: left; }
    .avail-head-slot { min-width: 110px; padding: 10px 8px; text-align: center; background: #0B1F3A; color: #fff; }
    .avail-head-slot.best { background: #C09D5F; color: #0B1F3A; }
    .slot-day  { font-family: 'Cormorant Garamond', serif; font-size: 1rem; font-weight: 600; display: block; }
    .slot-date { font-size: 0.68rem; opacity: .75; display: block; }
    .slot-time { font-size: 0.65rem; opacity: .65; display: block; margin-top: 2px; }
    .best-pill { background: rgba(255,255,255,0.25); font-size: 0.58rem; padding: 2px 6px; border-radius: 20px; font-weight: 700; letter-spacing: .05em; text-transform: uppercase; display: inline-block; margin-top: 4px; color: #0B1F3A; }
    .avail-name-cell { padding: 10px 14px; background: #F6F1E9; text-align: left; }
    .p-name { font-size: 0.84rem; font-weight: 600; color: #0B1F3A; }
    .p-role { font-size: 0.68rem; color: #9CA3AF; text-transform: uppercase; letter-spacing: .04em; }
    .p-org  { font-size: 0.68rem; color: #9CA3AF; font-style: italic; }
    .avail-cell-td { height: 52px; width: 90px; cursor: pointer; text-align: center; vertical-align: middle; transition: filter .1s; }
    .avail-cell-td:hover { filter: brightness(.9); }
    .cell-avail { background: #D1FAE5; }
    .cell-unavail { background: #FEE2E2; }
    .cell-maybe { background: #FEF3C7; }
    .cell-empty { background: #F9FAFB; }
    .cell-confirmed-outline { outline: 3px solid #C09D5F; outline-offset: -3px; }
    .cell-icon { font-size: 1.1rem; }
    .avail-sum-label { background: #EBF0F7; text-align: center; padding: 8px 4px; font-size: .75rem; }
    .sum-count { font-size: 1rem; font-weight: 700; color: #0B1F3A; display: block; }
    .sum-pct   { font-size: .62rem; color: #9CA3AF; letter-spacing: .04em; }
    /* Timeline / history */
    .hist-item { display: flex; gap: 12px; padding: 9px 0; border-bottom: 1px solid #EDE6D9; font-size: .8rem; }
    .hist-dot  { width: 8px; height: 8px; border-radius: 50%; background: #C09D5F; flex-shrink: 0; margin-top: 5px; }
    .hist-time { color: #9CA3AF; min-width: 76px; flex-shrink: 0; }
    .hist-txt  { color: #4B5563; }
    /* Respond page slot grid  */
    .respond-slot-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 12px; }
    .respond-slot-card {
      border: 2px solid #E5E7EB; border-radius: 10px; padding: 14px; text-align: center;
      cursor: pointer; transition: all .2s; background: #fff; user-select: none;
    }
    .respond-slot-card:hover { border-color: #C09D5F; }
    .respond-slot-card.rs-avail   { background: #D1FAE5; border-color: #6EE7B7; }
    .respond-slot-card.rs-unavail { background: #FEE2E2; border-color: #FCA5A5; }
    .respond-slot-card.rs-maybe   { background: #FEF3C7; border-color: #FCD34D; }
    .rs-date { font-family: 'Cormorant Garamond', serif; font-size: 1.05rem; font-weight: 600; color: #0B1F3A; }
    .rs-time { font-size: .74rem; color: #6B7280; margin-top: 2px; }
    .rs-status { font-size: .72rem; font-weight: 600; margin-top: 8px; text-transform: uppercase; letter-spacing: .05em; }
    .rs-avail   .rs-status { color: #065F46; }
    .rs-unavail .rs-status { color: #991B1B; }
    .rs-maybe   .rs-status { color: #92400E; }
  </style>
</head>
<body>
  <!-- Primary app mount point -->
  <div id="view">
    <div class="loading-screen">
      <div class="brand-seal" style="width:64px;height:64px;border:2px solid #C09D5F;border-radius:50%;display:flex;align-items:center;justify-content:center;">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" width="38" height="38">
          <!-- Calendar body (red) -->
          <rect x="1.5" y="3.5" width="21" height="19.5" rx="2" fill="#DC2626"/>
          <!-- Calendar header band (darker red) -->
          <rect x="1.5" y="3.5" width="21" height="6" rx="2" fill="#991B1B"/>
          <rect x="1.5" y="7" width="21" height="2.5" fill="#991B1B"/>
          <line x1="1.5" y1="9.5" x2="22.5" y2="9.5" stroke="rgba(255,255,255,0.2)" stroke-width="0.8"/>
          <!-- Binding tabs (white) -->
          <line x1="7.5" y1="2" x2="7.5" y2="5.5" stroke="white" stroke-width="1.6" stroke-linecap="round" opacity="0.9"/>
          <line x1="16.5" y1="2" x2="16.5" y2="5.5" stroke="white" stroke-width="1.6" stroke-linecap="round" opacity="0.9"/>
          <!-- Subtle date grid -->
          <circle cx="6.5" cy="19" r="1" fill="rgba(255,255,255,0.3)"/>
          <circle cx="12" cy="19" r="1" fill="rgba(255,255,255,0.3)"/>
          <circle cx="17.5" cy="19" r="1" fill="rgba(255,255,255,0.3)"/>
          <circle cx="6.5" cy="22" r="1" fill="rgba(255,255,255,0.3)"/>
          <circle cx="12" cy="22" r="1" fill="rgba(255,255,255,0.3)"/>
          <circle cx="17.5" cy="22" r="1" fill="rgba(255,255,255,0.3)"/>
          <!-- Scales of justice (gold) -->
          <line x1="12" y1="7.5" x2="12" y2="16" stroke="#C09D5F" stroke-width="1.6" stroke-linecap="round"/>
          <line x1="4" y1="11" x2="20" y2="11" stroke="#C09D5F" stroke-width="1.7" stroke-linecap="round"/>
          <line x1="5.5" y1="11" x2="5.5" y2="14.5" stroke="#C09D5F" stroke-width="1.2" stroke-linecap="round"/>
          <line x1="18.5" y1="11" x2="18.5" y2="14.5" stroke="#C09D5F" stroke-width="1.2" stroke-linecap="round"/>
          <path d="M3.5 14.5 Q5.5 17.5 7.5 14.5" stroke="#C09D5F" stroke-width="1.4" fill="rgba(192,157,95,0.2)" stroke-linecap="round"/>
          <path d="M16.5 14.5 Q18.5 17.5 20.5 14.5" stroke="#C09D5F" stroke-width="1.4" fill="rgba(192,157,95,0.2)" stroke-linecap="round"/>
        </svg>
      </div>
      <p class="loading-text">LexSchedule</p>
      <div class="spinner"></div>
    </div>
  </div>

  <!-- Modal overlay -->
  <div id="modal-overlay" style="display:none;position:fixed;inset:0;background:rgba(11,31,58,.5);backdrop-filter:blur(4px);z-index:1000;align-items:center;justify-content:center;padding:20px;animation:fadeIn .2s ease;">
    <div id="modal-box" style="background:#fff;border-radius:18px;box-shadow:0 16px 40px rgba(11,31,58,.2);width:100%;max-width:580px;max-height:90vh;overflow-y:auto;animation:slideUp .25s ease;">
    </div>
  </div>

  <!-- Toast notifications -->
  <div id="toast-container" style="position:fixed;bottom:28px;right:28px;z-index:2000;display:flex;flex-direction:column;gap:8px;"></div>

  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
  <!-- EmailJS SDK — required for real email sending -->
  <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
